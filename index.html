<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Skill Treasure</title>
    <meta
      name="description"
      content="A playful treasure chest portfolio that visualizes technical skills as coins inside category chests."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero" aria-labelledby="site-title">
        <p class="hero__eyebrow">Skill Inventory</p>
        <h1 id="site-title">My Skill Treasure</h1>
        <p id="site-subtitle" class="hero__subtitle">
          A treasure-chest view of my technical toolkit across planning, control, learning, and robotics.
        </p>
        <div id="summary-stats" class="hero__stats" aria-label="Site summary"></div>
      </header>

      <main>
        <section class="intro-card" aria-label="Usage hint">
          <p>
            Open a chest to lift its coins into view. Hover or focus a coin for a quick note, and click a coin for
            more detail.
          </p>
        </section>

        <section id="chest-grid" class="chest-grid" aria-label="Skill categories"></section>
      </main>
    </div>

    <div id="tooltip" class="tooltip" role="tooltip" hidden></div>

    <div id="skill-modal" class="modal" hidden aria-hidden="true">
      <div class="modal__backdrop" data-close-modal="true"></div>
      <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <button class="modal__close" type="button" aria-label="Close skill details" data-close-modal="true">
          Close
        </button>
        <p id="modal-category" class="modal__kicker"></p>
        <h2 id="modal-title"></h2>
        <p id="modal-detail" class="modal__detail"></p>
        <div class="modal__section">
          <h3>Proficiency</h3>
          <p id="modal-proficiency"></p>
        </div>
        <div class="modal__section">
          <h3>Keywords</h3>
          <div id="modal-keywords" class="token-list"></div>
        </div>
        <div class="modal__section">
          <h3>Related Projects / Notes</h3>
          <ul id="modal-projects" class="modal__list"></ul>
        </div>
      </div>
    </div>

    <script id="skills-data-fallback" type="application/json">
      {
        "title": "My Skill Treasure",
        "subtitle": "A treasure-chest view of my technical toolkit across planning, control, learning, and robotics.",
        "categories": [
          {
            "name": "Control",
            "description": "Feedback control, optimal regulation, and safety-aware motion control.",
            "accent": "#d6a84a",
            "skills": [
              {
                "name": "PID",
                "detail": "Classical feedback control for dependable tracking and regulation loops.",
                "proficiency": "Comfortable tuning gains, filtering derivatives, and handling integral windup.",

                "projects": ["longitudinal speed control", "embedded actuator control labs"]
              },
              {
                "name": "LQR",
                "detail": "Linear quadratic regulator design for stabilizing linearized dynamical systems.",

                "projects": ["linearized vehicle control", "cart-pole style stabilization"]

              {
                "name": "MPC",
                "detail": "Receding-horizon constrained control with explicit optimization at each step.",

              },
              {
                "name": "iLQR",

                "projects": ["nonlinear trajectory optimization", "warm-starting control sequences"]
              },
              {
                "name": "CBF",
                "detail": "Control barrier functions for encoding safety constraints into low-level control.",
                "proficiency": "Combine safety filters with nominal controllers to maintain safe sets.",
                "keywords": ["safety", "barrier functions", "quadratic programs"],
                "projects": ["collision-avoidance filtering", "safe control overlays"]
              }
            ]
          },
          {
            "name": "Planning",

          },
          {

              {

                "keywords": ["generative modeling", "denoising", "trajectory generation"],

          {

              {

            ]
          }
        ]
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="script.js" defer></script>
  </body>
</html>
